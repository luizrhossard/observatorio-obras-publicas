version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: obras_postgres
    environment:
      POSTGRES_DB: obras_publicas
      POSTGRES_USER: obras_user
      POSTGRES_PASSWORD: obras_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obras_user -d obras_publicas"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: obras_metabase
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: obras_publicas
      MB_DB_PORT: 5432
      MB_DB_USER: obras_user
      MB_DB_PASS: obras_pass
      MB_DB_HOST: postgres
      MB_EMBEDDED_SDK: "true"
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obras_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: obras_publicas
      DB_USER: obras_user
      DB_PASSWORD: obras_pass
      API_BASE_URL: https://api.obrasgov.gestao.gov.br/obrasgov/api
      API_TIMEOUT: 30
      API_MAX_RETRIES: 3
      API_RETRY_DELAY: 1.0
      DATA_RAW_DIR: /app/data/raw
      DATA_PROCESSED_DIR: /app/data/processed
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
    working_dir: /app

volumes:
  postgres_data:
  metabase_data: